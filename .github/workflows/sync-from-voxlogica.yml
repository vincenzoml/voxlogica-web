name: Sync from VoxLogicA docs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out website repo
        uses: actions/checkout@v4

      - name: Check out authoritative VoxLogicA repo
        uses: actions/checkout@v4
        with:
          repository: vincenzoml/VoxLogicA
          path: _source

      - name: Sync docs into site root
        run: |
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.DS_Store' \
            --exclude 'README.md' \
            --exclude 'CNAME' \
            --exclude '.gitignore' \
            --exclude '.nojekyll' \
            _source/docs/ ./

      - name: Restore Pages metadata
        run: |
          printf 'voxlogica.org\n' > CNAME
          touch .nojekyll
          printf '.DS_Store\n' > .gitignore

      - name: Commit changes when needed
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Sync site from VoxLogicA docs"
          git push
